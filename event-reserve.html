<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reserve Event Seat - Friend's Cafe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <div class="logo">Friend's Cafe</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
        </ul>
    </div>
</nav>

<section class="event-reserve-hero">

    <div class="event-reserve-card">

        <h1>Reserve Your Seat</h1>
        <p class="event-subtext">
            Secure your spot for an unforgettable experience at Friend's Cafe.
        </p>

        <form id="eventForm"
              action="https://formspree.io/f/xjgedlnl"
              method="POST">

            <div class="form-group">
                <input type="text" name="name" required>
                <label>Your Name</label>
            </div>

            <div class="form-group">
                <input type="email" name="email" required>
                <label>Your Email</label>
            </div>

            <div class="form-group">
                <input type="number" name="guests" required>
                <label>Number of Seats</label>
            </div>

            <div class="form-group">
                <textarea name="message"></textarea>
                <label>Special Request (Optional)</label>
            </div>

            <button type="submit">Confirm Reservation</button>

        </form>

    </div>

</section>

<!-- Success Modal -->
<div class="modal-overlay" id="eventSuccessModal">
    <div class="modal-content">
        <h3>Your seat for the upcoming event is reserved 🎉</h3>
        <p>Redirecting you to gallery...</p>
    </div>
</div>

<style>
/* Fullscreen Hero Background */
.event-reserve-hero {
    min-height: 100vh;
    background: url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085') center/cover no-repeat;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Dark Overlay */
.event-reserve-hero::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.65);
}

/* Glass Card */
.event-reserve-card {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 450px;
    padding: 50px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    text-align: center;
    color: white;
}

/* Heading */
.event-reserve-card h1 {
    font-size: 32px;
    margin-bottom: 10px;
}

.event-subtext {
    margin-bottom: 30px;
    font-size: 15px;
    opacity: 0.85;
}

/* Floating Label Form */
.form-group {
    position: relative;
    margin-bottom: 25px;
}

.form-group input,
.form-group textarea {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 8px;
    background: rgba(255,255,255,0.15);
    color: white;
    font-size: 14px;
    outline: none;
}

.form-group textarea {
    resize: none;
    height: 80px;
}

.form-group label {
    position: absolute;
    left: 14px;
    top: 14px;
    font-size: 14px;
    color: #ddd;
    pointer-events: none;
    transition: 0.3s ease;
}

/* Floating effect */
.form-group input:focus + label,
.form-group input:valid + label,
.form-group textarea:focus + label,
.form-group textarea:valid + label {
    top: -8px;
    left: 10px;
    font-size: 12px;
    background: #4b2e2e;
    padding: 2px 6px;
    border-radius: 4px;
}

/* Button */
.event-reserve-card button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 8px;
    background: #4b2e2e;
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s ease;
}

.event-reserve-card button:hover {
    background: #6b3e3e;
}

/* Responsive */
@media (max-width: 600px) {
    .event-reserve-card {
        padding: 30px;
    }
}
</style>

<script>
    // EVENT RESERVATION FORM
document.addEventListener("DOMContentLoaded", function () {

    const eventForm = document.getElementById("eventForm");
    const eventModal = document.getElementById("eventSuccessModal");

    if (!eventForm) return;

    eventForm.addEventListener("submit", function (e) {
        e.preventDefault();

        const formData = new FormData(eventForm);

        fetch(eventForm.action, {
            method: "POST",
            body: formData,
            headers: {
                'Accept': 'application/json'
            }
        }).then(response => {

            if (response.ok) {
                eventModal.classList.add("active");

                eventForm.reset();

                setTimeout(() => {
                    window.location.href = "gallery.html";
                }, 3000);
            } else {
                alert("Something went wrong. Please try again.");
            }

        }).catch(() => {
            alert("Error submitting form.");
        });

    });

});
</script>

<script src="script.js"></script>
</body>
</html>
